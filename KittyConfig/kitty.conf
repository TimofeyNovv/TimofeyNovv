# -----------------------------
# Kitty on GNOME/Wayland by TimofeyNovv
# -----------------------------

# Принудительно запускать kitty через Wayland, а не через X11/XWayland.
linux_display_server wayland


# -----------------------------
# Theme
# -----------------------------

# BEGIN_KITTY_THEME
# Название выбранной темы - Catppuccin-Mocha
# Подключает внешний файл темы current-theme.conf.
# Именно из него берутся основные цвета Catppuccin-Mocha.
include current-theme.conf
# END_KITTY_THEME


# -----------------------------
# Fonts
# -----------------------------

# Размер шрифта в терминале.
font_size 15.0

# Основной шрифт для обычного текста.
font_family MesloLGS NF

# Шрифт для жирного текста.
bold_font MesloLGS NF

# Шрифт для курсива.
italic_font MesloLGS NF

# Шрифт для жирного курсива.
bold_italic_font MesloLGS NF


# Форма курсора: block = прямоугольный блочный курсор.
cursor_shape block

# Интервал мигания курсора.
# -1 = использовать значения мигания из системы.
cursor_blink_interval -1


# -----------------------------
# Transparency
# -----------------------------

# Прозрачность фона окна kitty.
background_opacity 0.97

# Разрешает динамически менять прозрачность во время работы kitty.
dynamic_background_opacity yes


# -----------------------------
# Layout / spacing
# -----------------------------

# Внутренний отступ от краёв окна до текста терминала.
window_padding_width 8

# Как располагать сетку символов внутри окна,
# если размер окна не кратен размеру символов.
# top-left = прижимать содержимое к левому верхнему углу.
placement_strategy top-left


# -----------------------------
# Window decorations
# -----------------------------

# Полностью скрыть системные декорации окна
# (верхнюю полоску, заголовок, системную рамку).
hide_window_decorations yes

# Никогда не показывать внутреннюю строку заголовка kitty для окон/сплитов.
window_title_bar_min_windows 0


# -----------------------------
# Tabs
# -----------------------------

# Располагать панель вкладок сверху.
tab_bar_edge top

# Стиль вкладок.
tab_bar_style powerline

# Вид носиков у powerline-вкладок.
tab_powerline_style slanted

# Выравнивание вкладок по левому краю.
tab_bar_align left

# Показывать панель вкладок уже начиная с 1 вкладки.
tab_bar_min_tabs 1

# Горизонтальные поля панели вкладок слева и справа.
tab_bar_margin_width 8

# Вертикальные отступы панели вкладок:
# первое число = сверху,
# второе число = снизу.
tab_bar_margin_height 6 0

# Разделитель между вкладками.
tab_separator " "

# Цвет фона всей полосы вкладок.
tab_bar_background #1e1e2e

# Цвет зоны отступов вокруг панели вкладок.
# none = не задавать отдельно, использовать естественное поведение.
tab_bar_margin_color none

# Цвет текста активной вкладки.
active_tab_foreground #11111b

# Цвет фона активной вкладки.
active_tab_background #89b4fa

# Стиль шрифта активной вкладки.
active_tab_font_style bold

# Цвет текста неактивных вкладок.
inactive_tab_foreground #bac2de

# Цвет фона неактивных вкладок.
inactive_tab_background #313244

# Стиль шрифта неактивных вкладок.
inactive_tab_font_style normal

# Максимальная длина заголовка вкладки.
tab_title_max_length 28

# Шаблон заголовка обычной вкладки.
# {index} = номер вкладки, {title[:28]} = заголовок, обрезанный до 28 символов.
tab_title_template " {index}: {title[:28]} "

# Шаблон заголовка активной вкладки.
active_tab_title_template " {index}: {title[:28]} "


# Толщина рамки окна.
window_border_width 0

# Включить минимальные границы там, где это нужно kitty.
draw_minimal_borders yes

# Цвет активной границы окна/области.
active_border_color #89b4fa

# Цвет неактивной границы окна/области.
inactive_border_color #45475a


# -----------------------------
# Wallpaper
# -----------------------------

# Путь к фоновой картинке внутри kitty(у меня на фоне изоражение гор в синеватом оттенке, чтобы сочеталось с темой).
background_image /home/timofeynov/Изображения/Estetic/wallpaper_terminal.png

# Как масштабировать фоновую картинку.
# cscaled = масштабировать с сохранением пропорций и заполнением области.
background_image_layout cscaled

# Использовать линейную интерполяцию при масштабировании картинки.
# Обычно это делает изображение мягче и приятнее.
background_image_linear yes

# Затемнение фоновой картинки цветом background.
# Чем ближе к 1.0, тем сильнее картинка затемняется.
background_tint 0.97

# Затемнение в зонах gaps/отступов.
# 1.0 = отдельного осветления/затемнения нет, выглядит ровнее.
background_tint_gaps 1.0

